services:
  # 1. Servis: Veritabanı (Kiler) - PostGIS ile Coğrafi Veri Destekli
  db:
    image: postgis/postgis:14-3.3
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: turizmdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Servis: Backend (Mutfak) - FastAPI
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      # Veritabanı adresi artık 'localhost' değil 'db' servisidir
      DATABASE_URL: postgresql://user:password@db/turizmdb
    depends_on:
      - db

volumes:
  postgres_data: